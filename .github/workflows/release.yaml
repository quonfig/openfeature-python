name: Release Package
on:
  push:
    branches: [main]

jobs:
  wait-for-sdk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Wait for quonfig on PyPI
        run: |
          # Read the floor version from pyproject.toml's runtime quonfig dep.
          # Strip leading version operators (>=, ^, ~, =) and whitespace.
          required=$(awk -F'"' '/^quonfig = /{print $2; exit}' pyproject.toml | sed 's/^[>=<^~ ]*//')
          if [ -z "$required" ]; then
            echo "Could not determine required quonfig version from pyproject.toml" >&2
            exit 1
          fi
          echo "Waiting for quonfig==$required on PyPI..."
          for i in $(seq 1 60); do
            if curl -sfI "https://pypi.org/pypi/quonfig/${required}/json" >/dev/null; then
              echo "Found quonfig==$required after ${i} polls"
              exit 0
            fi
            sleep 10
          done
          echo "Timed out waiting for quonfig==$required after 10 minutes" >&2
          exit 1

  test:
    needs: wait-for-sdk
    uses: ./.github/workflows/ci.yml

  check-version:
    runs-on: ubuntu-latest
    needs: test
    outputs:
      version-changed: ${{ steps.check.outputs.changed }}
      current-version: ${{ steps.check.outputs.current-version }}
    steps:
      - uses: actions/checkout@v4
      - name: Check if version needs publishing
        id: check
        run: |
          current_version=$(awk -F\" '/^version = /{print $2; exit}' pyproject.toml)
          echo "current-version=$current_version" >> $GITHUB_OUTPUT
          if curl -sfI "https://pypi.org/pypi/quonfig-openfeature/${current_version}/json" >/dev/null; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

  release:
    runs-on: ubuntu-latest
    needs: check-version
    if: needs.check-version.outputs.version-changed == 'true'
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          path: openfeature-python

      - name: Checkout sdk-python sibling
        uses: actions/checkout@v4
        with:
          repository: quonfig/sdk-python
          path: sdk-python

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Poetry
        run: pipx install poetry==1.8.3

      - name: Build distribution
        working-directory: openfeature-python
        run: poetry build

      - name: Publish to PyPI via trusted publishing
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: openfeature-python/dist
